<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/output.css" />
    <script src="https://unpkg.com/feather-icons"></script>
    <title>Perbarui Password</title>
  </head>

  <body class="bg-white min-h-screen flex flex-col">
     <div class="flex items-center justify-center flex-1">
      <div class="w-full max-w-7xl mx-auto grid md:grid-cols-2 items-center px-6 relative">
        <div class="hidden md:block absolute left-1/2 top-0 h-full w-[2px] bg-[#2B2363]/30 -translate-x-1/2"></div>
        <div class="pr-10">

          <!-- TEXT -->
          <div class="mb-10 -mt-20">
            <a
              href="verifikasi.html"
              class="flex items-center gap-2 text-[#2B2363] mb-2"
            >
              <i data-feather="arrow-left"></i>
              <span class="font-semibold text-xl">Perbarui Password</span>
            </a>
            <p class="text-base text-[#7b76b3]">Perbarui password akunmu untuk login</p>
          </div>

          <!-- FORM -->
          <form
            action="login.html"
            class="bg-gray-200 rounded-3xl p-8 max-w-md shadow-lg"
          >
           
            <!-- PASSWORD -->
            <div class="relative mb-4">
              <i
                data-feather="lock"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#7b76b3] w-5 h-5"
              ></i>

              <input
                type="password"
                id="password"
                required
                placeholder="Password..."
                class="w-full pl-12 pr-12 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#7B76B3]"
              />

              <i
                data-feather="eye"
                onclick="Password()"
                class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-[#7b76b3] w-5 h-5"
              >
              </i>
            </div>

            <!-- KONFIRMASI -->
            <div class="relative mb-4">
              <i
                data-feather="lock"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#7b76b3] w-5 h-5"
              ></i>
              <input
                type="password"
                name="konfirmasi"
                id="konfirmasi"
                required
                placeholder="Konfirmasi Password"
                class="w-full pl-12 pr-4 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#7B76B3]"
              />

              <i
                data-feather="eye"
                onclick="konfirmasiPassword()"
                class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-[#7b76b3] w-5 h-5"
              >
              </i>
            </div>

            <!-- BUTTON -->
            <button
              type="submit"
              class="w-full bg-[#2B2363] text-white py-3 rounded-full font-semibold hover:bg-[#7B76B3] transition"
            >
              Simpan
            </button>
          </form>
        </div>

        <!-- FOTO -->
        <div class="hidden md:flex justify-center pl-10">
          <img src="asset/authentication-74.png" class="w-[350px]" />
        </div>
      </div>
    </div>

    <script>
      feather.replace();

      function Password() {
        const input = document.getElementById("password");

        if (input.type === "password") {
          input.type = "text";
        } else {
          input.type = "password";
        }
      }

      function konfirmasiPassword() {
        const input = document.getElementById("konfirmasi");

        if (input.type === "password") {
          input.type = "text";
        } else {
          input.type = "password";
        }
      }
    </script>
  </body>
</html>
