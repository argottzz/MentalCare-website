<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="src/output.css" />
  <script src="https://unpkg.com/feather-icons"></script>
  <title>Lupa Password</title>
</head>

<body class="bg-[#2B2363] min-h-screen flex items-center">

  <div class="w-full max-w-7xl mx-auto grid md:grid-cols-2 items-center px-6 relative">
    <div class="hidden md:block absolute left-1/2 top-0 h-full w-[3px] bg-white/20 rounded-full"></div>
    <div class="text-white pr-10">

       <!-- TEXT -->
      <div class="mb-10 -mt-16">
        <a href="login.html" class="flex items-center gap-2 mb-2">
          <i data-feather="arrow-left"></i>
          <span class="font-semibold text-xl">Lupa Password</span>
        </a>

        <p class="text-gray-300 text-sm max-w-sm">
          Masukan email anda disini untuk mereset password
        </p>
      </div>

      <!-- FORM -->
      <form action="verifikasi.html" class="bg-gray-200 rounded-2xl p-8 max-w-md shadow-xl">
        <div class="relative mb-6">
          <i
            data-feather="mail"
            class="absolute left-4 top-1/2 -translate-y-1/2 text-[#7b76b3] w-5 h-5"
          ></i>

          <input
            type="email"
            name="email"
            required
            placeholder="Email..."
            class="w-full pl-12 pr-4 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#2B2363]"
          />
        </div>

        <!-- BUTTON KIRIM -->
        <button
          type="submit"
          class="w-full bg-[#2B2363] text-white py-3 rounded-full font-semibold hover:bg-[#7B76B3] transition">
          Kirim
        </button>

      </form>
    </div>

    <!-- FOTO -->
    <div class="hidden md:flex justify-center pl-10">
      <img src="asset/authentication-19.png" class="w-[320px]" />
    </div>

  </div>

  <script>
    src="../path/to/flowbite/dist/flowbite.min.js"

    feather.replace();
  </script>
</body>
</html>
