<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/output.css" />
    <script src="https://unpkg.com/feather-icons"></script>
    <title>Daftar</title>
  </head>

  <body class="bg-white min-h-screen flex flex-col">
    <div class="flex items-center justify-center flex-1">
      <div
        class="w-full max-w-7xl mx-auto grid md:grid-cols-2 items-center px-6"
      >
        <div>
          <!-- TEXT DAFTAR -->
          <div class="mb-10">
            <span class="font-semibold text-xl text-[#2B2363]">Daftar</span>
            <p class="text-base text-[#7b76b3]">Mari buat akunmu</p>
          </div>

          <!-- FORM DAFTAR -->
          <form
            action="login.html"
            class="bg-gray-200 rounded-3xl p-8 max-w-md shadow-lg"
          >
            <!-- EMAIL -->
            <div class="relative mb-4">
              <i
                data-feather="mail"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#7b76b3] w-5 h-5"
              ></i>
              <input
                type="email"
                name="email"
                required
                placeholder="Email..."
                class="w-full pl-12 pr-4 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#2B2363]"
              />
            </div>

            <!-- PASSWORD -->
            <div class="relative mb-4">
              <i
                data-feather="lock"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#7b76b3] w-5 h-5"
              ></i>

              <input
                type="password"
                id="password"
                required
                placeholder="Password..."
                class="w-full pl-12 pr-12 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#7B76B3]"
              />

              <i
                data-feather="eye"
                onclick="Password()"
                class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-[#7b76b3] w-5 h-5"
              >
              </i>
            </div>

            <!-- KONFIRMASI -->
            <div class="relative mb-4">
              <i
                data-feather="lock"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-[#7b76b3] w-5 h-5"
              ></i>
              <input
                type="password"
                name="konfirmasi"
                id="konfirmasi"
                required
                placeholder="Konfirmasi Password"
                class="w-full pl-12 pr-4 py-3 rounded-full border border-gray-400 outline-none shadow-inner text-[#7B76B3]"
              />

              <i
                data-feather="eye"
                onclick="konfirmasiPassword()"
                class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-[#7b76b3] w-5 h-5"
              >
              </i>
            </div>

            <!-- TOMBOL DAFTAR -->
            <div class="text-right text-sm mb-6">
              <a href="login.html" class="text-[#2B2363]">
                Sudah punya akun?
                <span class="text-blue-400 hover:underline">Login</span>
              </a>
            </div>
            <button
              type="submit"
              class="w-full bg-[#2B2363] text-white py-3 rounded-full font-semibold hover:bg-[#7B76B3] transition"
            >
              Daftar
            </button>
          </form>

          <!-- OPSI LOGIN LAIN -->
          <div class="mt-10 max-w-md">
            <div class="flex items-center gap-4 text-[#2B2363] text-sm">
              <div class="flex-1 h-[1px] bg-gray-400"></div>
              <span>Or continue with</span>
              <div class="flex-1 h-[1px] bg-gray-400"></div>
            </div>

            <div class="flex gap-4 mt-6">
              <button
                class="flex items-center justify-center gap-2 bg-white text-[#2B2363] px-4 py-2 rounded-full w-full shadow hover:-translate-y-2 hover:shadow-xl transition duration-300"
              >
                <img src="asset/google.jpg" class="w-7" />Google
              </button>

              <button
                class="flex items-center justify-center gap-2 bg-white text-[#2B2363] px-4 py-2 rounded-full w-full shadow hover:-translate-y-2 hover:shadow-xl transition duration-300"
              >
                <img src="asset/whatsapp.jpg" class="w-5 rounded-sm" />WhatsApp
              </button>
            </div>
          </div>
        </div>

        <!-- FOTO -->
        <div class="hidden md:flex justify-center relative">
          <div
            class="absolute left-0 top-0 h-full w-[2px] bg-[#2B2363]/30"
          ></div>
          <img src="asset/book-lover-25.png" class="w-[350px]" />
        </div>
      </div>
    </div>

    <script>
      feather.replace();

      function Password() {
        const input = document.getElementById("password");

        if (input.type === "password") {
          input.type = "text";
        } else {
          input.type = "password";
        }
      }

      function konfirmasiPassword() {
        const input = document.getElementById("konfirmasi");

        if (input.type === "password") {
          input.type = "text";
        } else {
          input.type = "password";
        }
      }
    </script>
  </body>
</html>
